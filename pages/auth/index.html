<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/reinforceDemo/assets/images/logo/Reinforce-favicon.png" />
    <title>Sign Up - Reinforce</title>
    <script>
      (function applyStoredTheme() {
        try {
          var savedTheme = localStorage.getItem('app-theme');
          if (savedTheme === 'light' || savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', savedTheme);
          }
        } catch (error) {
          // Ignore storage access failures.
        }
      })();
    </script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons&display=block" />
    <link rel="stylesheet" href="/reinforceDemo/assets/styles/global.css" />
    <link rel="stylesheet" href="/reinforceDemo/components/header/header.css" />
    <link rel="stylesheet" href="/reinforceDemo/components/footer/footer.css" />
    <link rel="stylesheet" href="./auth.css" />

    <script defer src="/reinforceDemo/assets/js/theme.js"></script>
    <script defer src="./index.js"></script>
  </head>
  <body>
    <div id="app-auth" class="auth-page">
      <div id="header-mount" data-component="header" aria-live="polite"></div>

      <main class="auth-main">
        <!-- User Type Selection -->
        <section class="auth-user-type-section reveal-up">
          <div class="container auth-user-type-container">
            <div class="auth-user-type-content">
              <h1 class="auth-main-title">Join <span class="title-highlight"><span class="title-light">Re</span>Inforce</span></h1>
              <p class="auth-main-subtitle">Choose your account type to get started</p>

              <div class="auth-user-type-options">

                <button class="user-type-card" data-user-type="aou">
                  <div class="user-type-icon aou-icon">
                    <span class="material-icons">school</span>
                  </div>
                  <h3 class="user-type-title">AOUer</h3>
                  <p class="user-type-description">Sign up with your university email</p>
                </button>

                <button class="user-type-card" data-user-type="public">
                  <div class="user-type-icon public-icon">
                    <span class="material-icons">person</span>
                  </div>
                  <h3 class="user-type-title">Public Member</h3>
                  <p class="user-type-description">Sign up as a general learner</p>

                </button>
              </div>

              <div class="auth-signin-link">
                <span>Already have an account?</span>
                <a href="#" class="signin-link">Sign In</a>
              </div>
            </div>
          </div>
        </section>

        <!-- Sign Up Form -->
        <section class="auth-form-section" id="formSection">
          <div class="container auth-form-container">
            <div class="auth-form-wrapper">
              <!-- AOU Sign Up Form -->
              <form class="auth-form aou-form" id="aouForm" style="display: none;">
                <div class="auth-form-header">
                  <button type="button" class="auth-back-btn" id="backBtnAou" title="Go back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="19" y1="12" x2="5" y2="12"></line>
                      <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                  </button>
                  <h2 class="auth-form-title">Create Your Account</h2>
                  <div style="width: 20px;"></div>
                </div>

                <div class="auth-form-body">
                  <div class="form-group">
                    <label for="aouEmail" class="form-label">University Email</label>
                    <input
                      type="email"
                      id="aouEmail"
                      name="email"
                      class="form-input"
                      placeholder="your.name@aou.edu"
                      required
                    />
                    <span class="form-error" id="aouEmailError"></span>
                  </div>

                  <div class="form-group">
                    <label for="aouPassword" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                      <input
                        type="password"
                        id="aouPassword"
                        name="password"
                        class="form-input"
                        placeholder="Create a strong password"
                        required
                      />
                      <button type="button" class="password-toggle" data-target="aouPassword" title="Toggle password visibility">
                        <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                          <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
                          <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                      </button>
                    </div>
                    <span class="form-error" id="aouPasswordError"></span>
                  </div>

                  <label class="checkbox-label">
                    <input type="checkbox" name="terms" id="aouTerms" required />
                    <span>I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a></span>
                  </label>

                  <button type="submit" class="auth-submit-btn">Create Account</button>

                  <div class="auth-form-divider">
                    <span>Already have an account?</span>
                  </div>

                  <a href="#" class="auth-link-btn">Sign In</a>
                </div>
              </form>

              <!-- Public Sign Up Form -->
              <form class="auth-form public-form" id="publicForm" style="display: none;">
                <div class="auth-form-header">
                  <button type="button" class="auth-back-btn" id="backBtnPublic" title="Go back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="19" y1="12" x2="5" y2="12"></line>
                      <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                  </button>
                  <h2 class="auth-form-title">Create Your Account</h2>
                  <div style="width: 20px;"></div>
                </div>

                <div class="auth-form-body">
                  <div class="form-group">
                    <label for="publicName" class="form-label">Full Name</label>
                    <input
                      type="text"
                      id="publicName"
                      name="fullname"
                      class="form-input"
                      placeholder="Your full name"
                      required
                    />
                    <span class="form-error" id="publicNameError"></span>
                  </div>

                  <div class="form-group">
                    <label for="publicEmail" class="form-label">Email Address</label>
                    <input
                      type="email"
                      id="publicEmail"
                      name="email"
                      class="form-input"
                      placeholder="your.email@example.com"
                      required
                    />
                    <span class="form-error" id="publicEmailError"></span>
                  </div>

                  <div class="form-group">
                    <label for="publicPassword" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                      <input
                        type="password"
                        id="publicPassword"
                        name="password"
                        class="form-input"
                        placeholder="Create a strong password"
                        required
                      />
                      <button type="button" class="password-toggle" data-target="publicPassword" title="Toggle password visibility">
                        <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                          <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
                          <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                      </button>
                    </div>
                    <span class="form-error" id="publicPasswordError"></span>
                  </div>

                  <label class="checkbox-label">
                    <input type="checkbox" name="terms" id="publicTerms" required />
                    <span>I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a></span>
                  </label>

                  <button type="submit" class="auth-submit-btn">Create Account</button>

                  <div class="auth-form-divider">
                    <span>Already have an account?</span>
                  </div>

                  <a href="#" class="auth-link-btn">Sign In</a>
                </div>
              </form>

              <!-- Sign In Form -->
              <form class="auth-form signin-form" id="signinForm" style="display: none;">
                <div class="auth-form-header">
                  <button type="button" class="auth-back-btn" id="backBtnSignin" title="Go back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="19" y1="12" x2="5" y2="12"></line>
                      <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                  </button>
                  <h2 class="auth-form-title">Sign In</h2>
                  <div style="width: 20px;"></div>
                </div>

                <div class="auth-form-body">
                  <div class="form-group">
                    <label for="signinEmail" class="form-label">Email Address</label>
                    <input
                      type="email"
                      id="signinEmail"
                      name="email"
                      class="form-input"
                      placeholder="your.email@example.com"
                      required
                    />
                    <span class="form-error" id="signinEmailError"></span>
                  </div>

                  <div class="form-group">
                    <label for="signinPassword" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                      <input
                        type="password"
                        id="signinPassword"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                      />
                      <button type="button" class="password-toggle" data-target="signinPassword" title="Toggle password visibility">
                        <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                          <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
                          <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                      </button>
                    </div>
                    <span class="form-error" id="signinPasswordError"></span>
                  </div>

                  <div class="signin-remember-forgot">
                    <label class="checkbox-label">
                      <input type="checkbox" name="remember" id="signinRemember" />
                      <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password-link">Forgot password?</a>
                  </div>

                  <button type="submit" class="auth-submit-btn">Sign In</button>

                  <div class="auth-form-divider">
                    <span>Don't have an account?</span>
                  </div>

                  <a href="#" class="auth-link-btn" id="signupFromSigninBtn">Create Account</a>
                </div>
              </form>
            </div>
          </div>
        </section>
      </main>

      <div id="footer-mount" data-component="footer" aria-live="polite"></div>
    </div>
  </body>
</html>
